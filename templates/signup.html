<!DOCTYPE html>
<html>
<head>
    <title>DamCerti - Sign Up</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap');
        * { box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0F1420;
            color: #E8E6E1;
            margin: 0;
            padding: 40px 20px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            max-width: 400px;
            width: 100%;
            background: #161D2E;
            border: 1px solid #262F45;
            border-radius: 16px;
            padding: 40px;
        }
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            font-weight: 700;
            color: #F4F1EA;
            margin: 0 0 24px 0;
            text-align: center;
        }
        input {
            width: 100%;
            background: #0F1420;
            border: 1px solid #2C3652;
            border-radius: 8px;
            padding: 12px;
            color: #E8E6E1;
            font-size: 14px;
            margin-bottom: 14px;
        }
        button {
            background: linear-gradient(135deg, #C9A66B, #B8935A);
            color: #0F1420;
            border: none;
            border-radius: 8px;
            padding: 14px 28px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }
        .google-btn {
            background: #1F2942;
            color: #E8E6E1;
            border: 1px solid #2C3652;
            margin-top: 10px;
        }
        .divider {
            text-align: center;
            color: #8B93A7;
            font-size: 13px;
            margin: 18px 0;
        }
        .error {
            background: #3A1F24;
            color: #F2A5A5;
            border: 1px solid #5C2C33;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 13px;
            margin-bottom: 16px;
        }
        .success {
            background: #1F3A2A;
            color: #A5E8C3;
            border: 1px solid #2C5C3F;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 13px;
            margin-bottom: 16px;
        }
        .bottom-link {
            text-align: center;
            margin-top: 18px;
            font-size: 13px;
            color: #8B93A7;
        }
        .bottom-link a {
            color: #C9A66B;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Create Account</h1>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        {% if success %}
        <div class="success">{{ success }}</div>
        {% endif %}

        <form method="POST" action="/signup">
            <input type="email" name="email" placeholder="Email" required>
            <input type="password" name="password" placeholder="Password (min 8 characters)" required minlength="8">
            <button type="submit">Sign Up</button>
        </form>

        <div class="divider">or</div>

        <a href="/login/google" style="text-decoration:none;">
            <button type="button" class="google-btn">Sign up with Google</button>
        </a>

        <div class="bottom-link">
            Already have an account? <a href="/login">Log in</a>
        </div>
    </div>
</body>
</html>
